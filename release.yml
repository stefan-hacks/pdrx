name: Release & Update Homebrew Formula

# Triggers:
#   • Push a tag like v1.6.0  → create a GitHub Release, then update Formula/pdrx.rb
#   • Manual dispatch          → re-run the formula update for the latest tag
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.5.0, v2.0.1
  workflow_dispatch:

permissions:
  contents: write   # needed to push the updated formula back to main

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Create the GitHub Release (skipped on workflow_dispatch)
  # ─────────────────────────────────────────────────────────────
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"            # e.g. v1.5.0
          VERSION="${TAG#v}"                  # e.g. 1.5.0
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "pdrx ${{ steps.meta.outputs.tag }}" \
            --notes "$(sed -n '/^## \[${{ steps.meta.outputs.version }}\]/,/^## \[/{ /^## \[/d; p }' CHANGELOG.md 2>/dev/null || echo 'See commit history for changes.')" \
            --latest

  # ─────────────────────────────────────────────────────────────
  # 2. Update Formula/pdrx.rb with the real sha256 + version
  # ─────────────────────────────────────────────────────────────
  update-formula:
    # Run after the release job (if triggered by tag), or directly (workflow_dispatch)
    needs: [release]
    if: always() && (needs.release.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve tag + version
        id: meta
        run: |
          # On tag push the release job already computed these; on workflow_dispatch we derive them
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ needs.release.outputs.tag }}"
            VERSION="${{ needs.release.outputs.version }}"
          else
            # Latest tag reachable from main
            TAG="$(git describe --tags --abbrev=0 origin/main 2>/dev/null || git tag --sort=-version:refname | head -1)"
            VERSION="${TAG#v}"
          fi
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute sha256 of release tarball
        id: sha
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "Fetching ${URL} ..."
          SHA256=$(curl -fsSL "${URL}" | sha256sum | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}"       >> "$GITHUB_OUTPUT"

      - name: Update Formula/pdrx.rb
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"
          FORMULA="Formula/pdrx.rb"

          # Patch url, sha256 and version lines in-place (GNU sed)
          sed -i \
            -e "s|url \"https://github.com/stefan-hacks/pdrx/archive/refs/tags/v[^\"]*\"|url \"${URL}\"|" \
            -e "s|sha256 \"[^\"]*\"|sha256 \"${SHA256}\"|" \
            -e "s|version \"[^\"]*\"|version \"${VERSION}\"|" \
            "$FORMULA"

          echo "--- Updated formula ---"
          grep -E 'url |sha256 |version ' "$FORMULA"

      - name: Commit and push updated formula
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet Formula/pdrx.rb; then
            echo "Formula already up to date — nothing to commit."
            exit 0
          fi

          git add Formula/pdrx.rb
          git commit -m "chore: update homebrew formula to ${{ steps.meta.outputs.tag }}"
          git push origin main

  # ─────────────────────────────────────────────────────────────
  # 3. Shellcheck on every push (tags included)
  # ─────────────────────────────────────────────────────────────
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on pdrx
        run: shellcheck --severity=style pdrx

      - name: Run shellcheck on install_manpage.sh
        run: shellcheck --severity=style install_manpage.sh || true
